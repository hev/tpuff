version: 2

project_name: tpuff

before:
  hooks:
    - go mod tidy

builds:
  - id: tpuff
    main: .
    binary: tpuff
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/hev/tpuff/cmd.version={{.Version}}
    goos: [linux, darwin]
    goarch: [amd64, arm64]

archives:
  - id: tpuff
    builds: [tpuff]
    name_template: "tpuff_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - monitoring.md

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"
      - "Merge pull request"
      - "Merge branch"

dockers:
  - id: exporter-amd64
    goos: linux
    goarch: amd64
    ids: [tpuff]
    dockerfile: Dockerfile.exporter
    image_templates:
      - "hevmind/tpuff:{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"

  - id: exporter-arm64
    goos: linux
    goarch: arm64
    ids: [tpuff]
    dockerfile: Dockerfile.exporter
    image_templates:
      - "hevmind/tpuff:{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "hevmind/tpuff:{{ .Version }}"
    image_templates:
      - "hevmind/tpuff:{{ .Version }}-amd64"
      - "hevmind/tpuff:{{ .Version }}-arm64"
  - name_template: "hevmind/tpuff:latest"
    image_templates:
      - "hevmind/tpuff:{{ .Version }}-amd64"
      - "hevmind/tpuff:{{ .Version }}-arm64"

release:
  github:
    owner: hev
    name: tpuff
  prerelease: auto
  draft: false
  header: |
    ## tpuff {{ .Version }}

    Install with `go install github.com/hev/tpuff@{{ .Tag }}`, or download a
    prebuilt binary below.
  footer: |
    **Full changelog**: https://github.com/hev/tpuff/compare/{{ .PreviousTag }}...{{ .Tag }}
